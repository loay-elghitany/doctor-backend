version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=5000
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev
